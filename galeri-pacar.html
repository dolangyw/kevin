<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeri Akar Cinta Kita</title>

<style>

body{
margin:0;
padding:0;
background:#1a1011;
color:#f4e7d3;
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
overflow-x:hidden;
cursor:pointer;
scroll-behavior:smooth;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:
radial-gradient(circle at 20% 30%,rgba(229,107,127,0.15),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(232,180,184,0.15),transparent 40%);
animation:bgmove 12s linear infinite;
}

@keyframes bgmove{
0%{transform:translateY(0)}
50%{transform:translateY(-40px)}
100%{transform:translateY(0)}
}

.intro{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
flex-direction:column;
animation:fadeIntro 2s ease;
}

@keyframes fadeIntro{
from{opacity:0;transform:translateY(30px)}
to{opacity:1;transform:translateY(0)}
}

.intro h1{
font-weight:300;
letter-spacing:3px;
margin-bottom:10px;
color:#e8b4b8;
font-size:38px;
}

.intro p{
font-style:italic;
color:#b5838d;
animation:pulseText 3s infinite;
}

@keyframes pulseText{
0%{opacity:.4}
50%{opacity:1}
100%{opacity:.4}
}

.root-container{
position:relative;
max-width:900px;
margin:0 auto;
padding:50px 0;
display:flex;
flex-direction:column;
}

.root-container::before{
content:'';
position:absolute;
top:0;
left:50%;
width:4px;
height:100%;
background:linear-gradient(#6d3540,#e56b7f,#6d3540);
transform:translateX(-50%);
border-radius:5px;
box-shadow:0 0 25px rgba(229,107,127,0.5);
}

.memory-node{
display:flex;
justify-content:flex-end;
align-items:center;
width:50%;
margin-bottom:150px;
position:relative;
opacity:0;
transform:translateY(80px);
transition:1s cubic-bezier(.2,.7,.2,1);
}

.memory-node.show{
opacity:1;
transform:translateY(0);
}

.memory-node:nth-child(even){
align-self:flex-end;
justify-content:flex-start;
margin-left:50%;
}

.memory-node::before{
content:'';
position:absolute;
top:50%;
right:0;
width:60px;
height:3px;
background:#6d3540;
}

.memory-node:nth-child(even)::before{
left:0;
right:auto;
}

.memory-node::after{
content:'';
position:absolute;
top:50%;
right:-7px;
width:14px;
height:14px;
background:#e56b7f;
border-radius:50%;
transform:translateY(-50%);
box-shadow:0 0 20px #e56b7f;
animation:nodePulse 2.5s infinite;
}

.memory-node:nth-child(even)::after{
left:-7px;
right:auto;
}

@keyframes nodePulse{
0%{box-shadow:0 0 10px #e56b7f}
50%{box-shadow:0 0 35px #ff8fa3}
100%{box-shadow:0 0 10px #e56b7f}
}

.photo-frame{
background:#2a1b1d;
padding:15px;
border:1px solid #6d3540;
border-radius:14px;
margin:0 60px;
width:280px;
box-shadow:0 10px 40px rgba(0,0,0,0.7);
transition:transform .4s cubic-bezier(.2,.7,.2,1),opacity .4s,box-shadow .4s,filter .4s;
z-index:3;
opacity:.6;
backdrop-filter:blur(3px);
}

.photo-frame:hover{
transform:scale(1.08);
box-shadow:0 0 35px rgba(229,107,127,0.6);
}

.photo-frame img{
width:100%;
border-radius:8px;
display:block;
filter:brightness(.9) contrast(1.1);
transition:transform .8s ease,filter .6s;
}

.photo-frame:hover img{
transform:scale(1.1);
filter:brightness(1.05) contrast(1.2);
}

.photo-frame p{
margin:15px 0 0;
text-align:center;
font-size:.95em;
color:#e8b4b8;
font-style:italic;
}

.end-root{
text-align:center;
padding:120px 0 200px;
color:#b5838d;
font-style:italic;
opacity:0;
transform:translateY(40px);
transition:1.2s;
}

.end-root.show{
opacity:1;
transform:translateY(0);
}

.particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.particles span{
position:absolute;
display:block;
width:6px;
height:6px;
background:#e56b7f;
border-radius:50%;
opacity:.4;
animation:float 12s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh) scale(0)}
100%{transform:translateY(-10vh) scale(1)}
}

</style>
</head>

<body>

<div class="particles" id="particles"></div>

<audio id="bgMusic" loop>
<source src="./music6.mp3" type="audio/mpeg">
</audio>

<div class="intro">
<h1>Akar Cinta</h1>
<p>Sentuh layar untuk menyusuri perjalanan kita...</p>
</div>

<div class="root-container">

<div class="memory-node">
  <div class="photo-frame">
    <img src="./pacar/1.jpeg">
    <p>Tatap pertama yang tak terlupa.</p>
  </div>
</div>

<div class="memory-node">
  <div class="photo-frame">
    <img src="./pacar/2.jpeg">
    <p>Rasa mulai tumbuh di hati.</p>
  </div>
</div>

<div class="memory-node">
  <div class="photo-frame">
    <img src="./pacar/3.jpeg">
    <p>Tawa kecil yang jadi kenangan.</p>
  </div>
</div>

<div class="memory-node">
  <div class="photo-frame">
    <img src="./pacar/4.jpeg">
    <p>Genggaman yang menenangkan.</p>
  </div>
</div>

<div class="memory-node">
  <div class="photo-frame">
    <img src="./pacar/5.jpeg">
    <p>Cinta yang makin kuat.</p>
  </div>
</div>

<div class="memory-node">
  <div class="photo-frame">
    <img src="./pacar/6.jpeg">
    <p>Hari-hari yang terasa indah.</p>
  </div>
</div>

<div class="memory-node">
  <div class="photo-frame">
    <img src="./pacar/7.jpeg">
    <p>Kita, selamanya.</p>
  </div>
</div>

</div>

<div class="end-root">
<p>...dan akan terus bertumbuh selamanya.</p>
</div>
