<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Style Lyrics - Everything U Are</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            cursor: pointer;
        }

        .header {
            width: 100%;
            padding: 20px;
            background: linear-gradient(to bottom, #2a2a2a, #121212);
            text-align: center;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        #play-instruction {
            color: #1db954;
            font-size: 14px;
            margin-top: 10px;
            font-weight: bold;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .lyrics-wrapper {
            flex: 1;
            width: 100%;
            max-width: 800px;
            overflow-y: auto;
            padding: 40vh 20px;
            box-sizing: border-box;
            scroll-behavior: smooth;
            padding-bottom: 50vh;
        }

        .lyrics-wrapper::-webkit-scrollbar {
            display: none; 
        }

        .line {
            font-size: 28px;
            font-weight: 700;
            color: #535353;
            margin: 20px 0;
            transition: color 0.3s ease, font-size 0.3s ease;
            text-align: left;
            line-height: 1.4;
        }

        .line.active {
            color: #ffffff;
            font-size: 36px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        audio {
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin: 0 0 5px 0;">Everything U Are</h2>
        <p style="color: #b3b3b3; margin: 0; font-size: 14px;">Hindia</p>
        <div id="play-instruction">Ketuk layar di mana saja untuk Play / Pause</div>
    </div>
    <div style="position: relative; top: -300px;">
    <div class="lyrics-wrapper" id="lyrics-container">
    </div></div>

    <audio id="audio-player">
        <source src="music6.mp3" type="audio/mpeg">
    </audio>
